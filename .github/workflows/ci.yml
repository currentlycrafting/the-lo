name: Expo CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop

# Keep only the latest run per branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions for validation-only workflow.
permissions:
  contents: read

jobs:
  validate:
    name: Validate code quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Expo doctor
        run: npx expo-doctor

      - name: Run TypeScript typecheck (if present)
        run: npm run typecheck --if-present

      - name: Run lint checks (if present)
        run: npm run lint --if-present

      - name: Run tests (if present)
        run: npm test --if-present

      - name: Add CI summary
        if: success()
        run: |
          {
            echo "## CI Validation Passed";
            echo "";
            echo "- Trigger: \`${{ github.event_name }}\`";
            echo "- Ref: \`${{ github.ref_name }}\`";
            echo "- Node: \`22\`";
            echo "- Dependency manager: \`npm\`";
            echo "- Checks run: \`expo-doctor\`, \`typecheck (if present)\`, \`lint (if present)\`, \`test (if present)\`";
          } >> "$GITHUB_STEP_SUMMARY"
