name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate code quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Expo tunnel dependency
        run: npm install -g @expo/ngrok@^4.1.0

      - name: Smoke test Expo tunnel startup
        run: |
          set -euo pipefail
          timeout 90s npm run start -- --tunnel > expo-tunnel.log 2>&1 || EXIT_CODE=$?
          EXIT_CODE=${EXIT_CODE:-0}
          cat expo-tunnel.log

          # 124 = timeout (expected once the dev server is running)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 124 ]; then
            exit "$EXIT_CODE"
          fi

          # Confirm Expo actually started and exposed a tunnel URL.
          if ! grep -Eq "exp://|Tunnel ready|Waiting on" expo-tunnel.log; then
            echo "Expo tunnel startup smoke check failed: no tunnel URL found in logs."
            exit 1
          fi

      - name: Run Expo doctor
        run: npx expo-doctor

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run lint checks
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: Add CI summary
        if: success()
        run: |
          {
            echo "## Frontend CI Passed";
            echo "";
            echo "- Trigger: \`${{ github.event_name }}\`";
            echo "- Ref: \`${{ github.ref_name }}\`";
            echo "- Node: \`22\`";
            echo "- Checks: \`expo-doctor\`, \`typecheck\`, \`lint\`, \`test\`";
          } >> "$GITHUB_STEP_SUMMARY"

  ios-tunnel-smoke:
    name: iOS tunnel smoke check
    runs-on: macos-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Expo tunnel dependency
        run: npm install -g @expo/ngrok@^4.1.0

      - name: Smoke test iOS tunnel command
        run: |
          set -euo pipefail
          EXIT_CODE=0
          npm run ios -- --tunnel > expo-ios-tunnel.log 2>&1 &
          CMD_PID=$!
          ELAPSED=0
          MAX_SECONDS=120

          while kill -0 "$CMD_PID" 2>/dev/null; do
            if [ "$ELAPSED" -ge "$MAX_SECONDS" ]; then
              kill "$CMD_PID" 2>/dev/null || true
              wait "$CMD_PID" 2>/dev/null || true
              EXIT_CODE=124
              break
            fi
            sleep 1
            ELAPSED=$((ELAPSED + 1))
          done

          if [ "$EXIT_CODE" -ne 124 ]; then
            wait "$CMD_PID" || EXIT_CODE=$?
          fi

          cat expo-ios-tunnel.log

          # Accept normal startup timeout once Metro is running.
          if [ "$EXIT_CODE" -eq 0 ] || [ "$EXIT_CODE" -eq 124 ]; then
            true
          # On CI, simulator URL-open can time out even when Metro+tunnel is healthy.
          elif grep -Eq "xcrun simctl openurl .* exited with non-zero code: 60" expo-ios-tunnel.log && grep -Eq "exp://" expo-ios-tunnel.log; then
            echo "Simulator open timed out, but Expo tunnel URL was generated; considering smoke test successful."
          else
            exit "$EXIT_CODE"
          fi

          if ! grep -Eq "exp://" expo-ios-tunnel.log; then
            echo "iOS tunnel smoke check failed: no Expo URL found in logs."
            exit 1
          fi
